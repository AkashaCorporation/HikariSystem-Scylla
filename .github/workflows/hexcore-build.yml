name: Scylla Build (Transition)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  npm_config_maxsockets: 8
  npm_config_loglevel: warn

jobs:
  build-extensions:
    name: Build Scylla Transition Extensions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: |
            extensions/hexcore-hexviewer/package-lock.json
            extensions/hexcore-peanalyzer/package-lock.json
            extensions/hexcore-hashcalc/package-lock.json
            extensions/hexcore-strings/package-lock.json
            extensions/hexcore-entropy/package-lock.json
            extensions/hexcore-base64/package-lock.json
            extensions/hexcore-filetype/package-lock.json
            extensions/hexcore-ioc/package-lock.json
            extensions/hexcore-yara/package-lock.json
            extensions/hexcore-elfanalyzer/package-lock.json
            extensions/hexcore-report-composer/package-lock.json
            extensions/hexcore-minidump/package-lock.json

      - name: Scylla Transition Preflight (Command/Build Coverage)
        run: node scripts/verify-hexcore-preflight.cjs

      - name: Raise File Descriptor Limit
        run: ulimit -n 65535 || true

      - name: Build Hex Viewer (Legacy)
        working-directory: extensions/hexcore-hexviewer
        run: |
          npm ci
          npm run compile

      - name: Build PE Analyzer (Legacy)
        working-directory: extensions/hexcore-peanalyzer
        run: |
          npm ci
          npm run compile

      - name: Build Hash Calculator (Legacy)
        working-directory: extensions/hexcore-hashcalc
        run: |
          npm ci
          npm run compile

      - name: Build Strings Extractor (Legacy)
        working-directory: extensions/hexcore-strings
        run: |
          npm ci
          npm run compile

      - name: Build Entropy Analyzer (Legacy)
        working-directory: extensions/hexcore-entropy
        run: |
          npm ci
          npm run compile

      - name: Build Base64 Decoder (Legacy)
        working-directory: extensions/hexcore-base64
        run: |
          npm ci
          npm run compile

      - name: Build File Type Detector (Legacy)
        working-directory: extensions/hexcore-filetype
        run: |
          npm ci
          npm run compile

      - name: Build Common Utilities (Legacy)
        working-directory: extensions/hexcore-common
        run: |
          npm ci
          npm run compile

      - name: Build IOC Extractor (Legacy)
        working-directory: extensions/hexcore-ioc
        run: |
          npm ci --ignore-scripts
          npm run compile

      - name: Build YARA Scanner (Legacy)
        working-directory: extensions/hexcore-yara
        run: |
          npm ci --ignore-scripts
          npm run compile

      - name: Build Minidump Parser (Legacy)
        working-directory: extensions/hexcore-minidump
        run: |
          npm ci --ignore-scripts
          npm run compile

      - name: Build ELF Analyzer (Legacy)
        working-directory: extensions/hexcore-elfanalyzer
        run: |
          npm ci
          npm run compile

      - name: Build Report Composer (Legacy)
        working-directory: extensions/hexcore-report-composer
        run: |
          npm ci
          npm run compile

      - name: Build Summary
        run: |
          echo "## Scylla Transition Legacy Extension Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Extension | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| hexcore-hexviewer | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "| hexcore-peanalyzer | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "| hexcore-hashcalc | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "| hexcore-strings | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "| hexcore-entropy | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "| hexcore-base64 | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "| hexcore-filetype | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "| hexcore-common | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "| hexcore-ioc | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "| hexcore-yara | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "| hexcore-minidump | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "| hexcore-elfanalyzer | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "| hexcore-report-composer | ✅ Built |" >> $GITHUB_STEP_SUMMARY

  lint:
    name: Lint TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "18"

      - name: Check TypeScript syntax (Hex Viewer Legacy)
        working-directory: extensions/hexcore-hexviewer
        run: |
          npm ci
          npx tsc --noEmit || true

      - name: Check TypeScript syntax (PE Analyzer Legacy)
        working-directory: extensions/hexcore-peanalyzer
        run: |
          npm ci
          npx tsc --noEmit || true
